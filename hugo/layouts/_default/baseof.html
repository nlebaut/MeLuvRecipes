<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Summary }}{{ . | plainify }}{{ else }}{{ site.Params.description }}{{ end }}">
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-row">
          <div>
            <h1>{{ site.Title }}</h1>
          </div>
          <nav class="hero-nav">
            <a href="{{ "" | relURL }}">Accueil</a>
            <a href="{{ "recipes/" | relURL }}">Toutes les recettes</a>
          </nav>
        </div>
        <p class="hero-copy">{{ site.Params.tagline }}</p>
        <div class="site-search" data-site-search>
          <label class="search-label" for="site-search-input">Chercher une recette</label>
          <input id="site-search-input" class="search-input" type="search" placeholder="Titre, ingrédient, texte libre" autocomplete="off">
          <div class="search-results" data-search-results hidden></div>
        </div>
      </header>
      <main>
        {{ block "main" . }}{{ end }}
      </main>
    </div>
    <script type="module" src="{{ "js/search.js" | relURL }}"></script>
  </body>
</html>
