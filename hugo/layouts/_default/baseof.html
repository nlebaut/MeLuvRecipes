<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Summary }}{{ . | plainify }}{{ else }}{{ site.Params.description }}{{ end }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">Aller au contenu</a>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-row">
          <div class="hero-copy-block">
            <h1>{{ site.Title }}</h1>
            <p class="hero-copy">{{ site.Params.tagline }}</p>
          </div>
          <nav class="hero-nav">
            <a class="button-link button-link-ghost" href="{{ "" | relURL }}">Accueil</a>
          </nav>
        </div>
        <div class="site-search" data-site-search>
          <label class="search-label" for="site-search-input">Chercher une recette</label>
          <input id="site-search-input" class="search-input" type="search" placeholder="Titre, ingrédient, texte libre" autocomplete="off" aria-describedby="site-search-help">
          <p id="site-search-help" class="search-help">Recherche instantanée par titre, ingrédient, durée ou texte de recette.</p>
          <div class="search-results" data-search-results hidden></div>
        </div>
      </header>
      <main id="main-content">
        {{ block "main" . }}{{ end }}
      </main>
    </div>
    <script type="module" src="{{ "js/search.js" | relURL }}"></script>
    {{ if and .IsSection (eq .Section "recipes") }}
      <script type="module" src="{{ "js/catalog.js" | relURL }}"></script>
    {{ end }}
    {{ if and .IsPage (eq .Type "recipes") }}
      <script type="module" src="{{ "js/recipe.js" | relURL }}"></script>
    {{ end }}
  </body>
</html>
