name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.1"

      - name: Install CookCLI
        run: |
          curl -fsSL -o cook.tar.gz https://github.com/cooklang/cookcli/releases/download/v0.29.0/cook-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf cook.tar.gz
          sudo mv cook /usr/local/bin/
          cook --version

      - name: Validate recipes
        run: |
          cook doctor validate --base-path recipes

      - name: Build static site
        run: |
          node scripts/build-site.mjs dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
